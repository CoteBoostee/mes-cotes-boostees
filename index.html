<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Côtes Boostées</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
🏆 Mes Côtes Boostées
</h1>

<p>
Suivi personnel des meilleures cotes boostées
</p>

</header>



<section class="dashboard">


<div class="stat">
<span>💰 Bénéfice</span>
<strong id="profit">0 €</strong>
</div>


<div class="stat">
<span>🎯 Paris</span>
<strong id="bets">0</strong>
</div>


<div class="stat">
<span>📈 ROI</span>
<strong id="roi">0 %</strong>
</div>


<div class="stat">
<span>✅ Réussite</span>
<strong id="success">0 %</strong>
</div>


</section>




<section class="filters">


<input 
id="search"
placeholder="🔎 Rechercher un pari..."
>


<select id="sportFilter">

<option value="">
⚽ Tous les sports
</option>

</select>



<select id="bookmakerFilter">

<option value="">
🎰 Tous les bookmakers
</option>

</select>



<select id="monthFilter">

<option value="">
📅 Tous les mois
</option>

</select>



</section>





<section id="lastBet">

</section>





<section id="bets-container">


</section>





<script src="config.js"></script>

<script src="script.js"></script>


</body>

</html>

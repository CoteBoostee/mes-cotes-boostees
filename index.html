<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Côtes Boostées</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" href="faviconmescotesboostees.png">  
  
</head>


<body>


<header>

<img src="faviconmescotesboostees.png" alt="Logo Mes Côtes Boostées" class="logo">
  
<h1>
Mes Côtes Boostées
</h1>

<p>
Suivi personnel des côtes boostées
</p>

</header>



<section class="dashboard">


<div class="stat">
<span>💰 Bénéfice</span>
<strong id="profit">0 €</strong>
</div>


<div class="stat">
<span>🎯 Paris</span>
<strong id="bets">0</strong>
</div>


<div class="stat">
<span>📈 ROI</span>
<strong id="roi">0 %</strong>
</div>


<div class="stat">
<span>✅ Réussite</span>
<strong id="success">0 %</strong>
</div>


</section>


<section id="monthStats" class="month-stats">

</section>



<section class="filters">


<input 
id="search"
placeholder="🔎 Rechercher un pari..."
>


<select id="sportFilter">

<option value="">
  Tous les sports
</option>

</select>



<select id="bookmakerFilter">

<option value="">
🎰 Tous les bookmakers
</option>

</select>



<select id="monthFilter">

<option value="">
📅 Tous les mois
</option>

</select>



</section>





<section id="lastBet">

</section>


<section class="graph-section">

<h2>📈 Évolution du bénéfice</h2>

<canvas id="profitChart"></canvas>

</section>


<section id="bets-container">


</section>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="config.js"></script>

<script src="script.js"></script>


</body>

</html>
